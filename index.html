<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8"/>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    MotoGo
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <div class="overlay"></div>

  <div class="container">

    <img
      src="Logo.png"
      class="logo"
    />

    <h1>
      MotoGo
    </h1>

    <p class="slogan">
      Rápido. Seguro. Contigo.
    </p>

    <input
      type="text"
      id="nombre"
      placeholder="Tu nombre"
    />

    <input
      type="tel"
      id="telefono"
      placeholder="Tu teléfono"
    />

    <input
      type="text"
      id="recogida"
      placeholder="Punto de recogida"
    />

    <input
      type="text"
      id="destino"
      placeholder="Destino"
    />

    <button
      class="btn"
      onclick="guardarDatos()">

      Solicitar viaje

    </button>

    <div id="map"></div>

  </div>

  <script src="app.js"></script>

  <script
    async
    defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBFE4kn9LeKNcSMugg2fdcuBpGeejvNWXg&libraries=places&callback=initMap">
  </script>

</body>

</html>
