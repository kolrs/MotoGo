<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    MotoGo
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <div class="overlay"></div>

  <div class="container">

    <div class="logoBox">

      <img
        src="Logo.png"
        class="logoImg"
      />

      <h1 class="logo">
        MotoGo
      </h1>

      <p class="slogan">
        Rápido. Seguro. Contigo.
      </p>

    </div>

    <div class="card">

      <input
        type="text"
        id="nombre"
        class="input"
        placeholder="Tu nombre"
      />

      <input
        type="tel"
        id="telefono"
        class="input"
        placeholder="Tu teléfono"
      />

      <input
        type="text"
        id="recogida"
        class="input"
        placeholder="Punto de recogida"
      />

      <input
        type="text"
        id="destino"
        class="input"
        placeholder="Destino"
      />

      <button
        class="btn"
        onclick="calcularRuta()">

        Solicitar viaje

      </button>

    </div>

    <div id="map"></div>

  </div>

  <script src="app.js"></script>

  <script
    async
    defer
    src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY&libraries=places&callback=initMap">
  </script>

</body>

</html>
