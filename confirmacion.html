<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8"/>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Confirmación
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <div class="container">

    <img
      src="Logo.png"
      class="logo"
    />

    <h1>
      Confirmar viaje
    </h1>

    <p class="slogan">
      Tu conductor será notificado 😎🏍️
    </p>

    <div class="card">

      💰 Total:
      $<span id="precio"></span> MXN

    </div>

    <button
      class="btn"
      onclick="confirmarViaje()">

      Confirmar y enviar

    </button>

  </div>

  <script src="app.js"></script>

  <script>

    document.getElementById(
      "precio"
    ).innerText =
    localStorage.getItem(
      "precio"
    );

  </script>

</body>

</html>
