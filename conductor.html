<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8"/>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Panel conductor
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body onload="mostrarDatosConductor()">

  <div class="container">

    <img
      src="Logo.png"
      class="logo"
    />

    <h1>
      Panel conductor
    </h1>

    <p class="slogan">
      Viaje activo
    </p>

    <div class="card">
      👤 Cliente:
      <span id="mostrarNombre"></span>
    </div>

    <div class="card">
      📞 Teléfono:
      <span id="mostrarTelefono"></span>
    </div>

    <div class="card">
      📍 Recogida:
      <span id="mostrarRecogida"></span>
    </div>

    <div class="card">
      🏁 Destino:
      <span id="mostrarDestino"></span>
    </div>

    <div class="card">
      🛣️ Distancia:
      <span id="mostrarDistancia"></span>
    </div>

    <div class="card">
      ⏱️ Tiempo:
      <span id="mostrarTiempo"></span>
    </div>

    <button
      class="btn"
      onclick="irPorCliente()">

      📍 Ir por cliente

    </button>

    <button
      class="btn"
      onclick="iniciarViaje()">

      🏍️ Iniciar viaje

    </button>

    <button
      class="btn"
      onclick="avisarCliente()">

      🚀 Voy en camino

    </button>

    <button
      class="btn red"
      onclick="finalizarViaje()">

      ✅ Finalizar viaje

    </button>

  </div>

  <script src="app.js"></script>

</body>

</html>
