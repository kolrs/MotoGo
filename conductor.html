<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8"/>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Panel conductor
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <div
    class="container"
    id="loginBox">

    <img
      src="Logo.png"
      class="logo"
    />

    <h1>
      MotoGo
    </h1>

    <p class="slogan">
      Acceso conductor
    </p>

    <input
      type="password"
      id="pin"
      placeholder="PIN conductor"
    />

    <button
      class="btn"
      onclick="verificarPin()">

      Entrar

    </button>

  </div>

  <div
    class="container"
    id="panelConductor"
    style="display:none;">

    <img
      src="Logo.png"
      class="logo"
    />

    <h1>
      Panel conductor
    </h1>

    <p class="slogan">
      Viaje activo
    </p>

    <div class="card">
      👤 Cliente:
      <span id="mostrarNombre"></span>
    </div>

    <div class="card">
      📞 Teléfono:
      <span id="mostrarTelefono"></span>
    </div>

    <div class="card">
      📍 Recogida:
      <span id="mostrarRecogida"></span>
    </div>

    <div class="card">
      🏁 Destino:
      <span id="mostrarDestino"></span>
    </div>

    <div class="card">
      🛣️ Distancia:
      <span id="mostrarDistancia"></span>
    </div>

    <div class="card">
      ⏱️ Tiempo:
      <span id="mostrarTiempo"></span>
    </div>

    <button
      class="btn"
      onclick="irPorCliente()">

      📍 Ir por cliente

    </button>

    <button
      class="btn"
      onclick="iniciarViaje()">

      🏍️ Iniciar viaje

    </button>

    <button
      class="btn"
      onclick="avisarCliente()">

      🚀 Voy en camino

    </button>

    <button
      class="btn red"
      onclick="finalizarViaje()">

      ✅ Finalizar viaje

    </button>

  </div>

  <script src="app.js"></script>

  <script>

    function verificarPin(){

      const pin =
      document.getElementById(
        "pin"
      ).value;

      if(pin === "2025"){

        document.getElementById(
          "loginBox"
        ).style.display = "none";

        document.getElementById(
          "panelConductor"
        ).style.display = "block";

        mostrarDatosConductor();

      }

      else{

        alert(
          "PIN incorrecto"
        );

      }

    }

  </script>

</body>

</html>
