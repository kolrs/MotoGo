<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cotización - MotoGo</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <h1 class="logo">MotoGo</h1>
    <p class="slogan">Tu viaje está listo</p>
    <div class="card">Cliente: <span id="mostrarNombre"></span></div>
    <div class="card">Recogida: <span id="mostrarRecogida"></span></div>
    <div class="card">Destino: <span id="mostrarDestino"></span></div>
    <div class="card">Tiempo estimado: <span id="tiempo"></span></div>
    <div class="card">Total: <span id="precio"></span></div>
    <button class="btn" onclick="irConfirmacion()">Confirmar viaje</button>
  </div>
  <script>
    const nombre = localStorage.getItem("nombre");
    const recogida = localStorage.getItem("recogida");
    const destino = localStorage.getItem("destino");
    const distancia = localStorage.getItem("distance");
    const duracion = localStorage.getItem("duration");

    document.getElementById("mostrarNombre").innerText = nombre;
    document.getElementById("mostrarRecogida").innerText = recogida;
    document.getElementById("mostrarDestino").innerText = destino;
    document.getElementById("tiempo").innerText = duracion;

    const km = parseFloat(distancia.replace(" km","".replace(",", ".")));
    const precio = 35 + km*5;
    document.getElementById("precio").innerText = "$" + precio.toFixed(0) + " MXN";
  </script>
  <script src="app.js"></script>
</body>
</html>
